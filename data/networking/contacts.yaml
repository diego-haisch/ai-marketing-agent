# ApplyChain — Base de datos de contactos
# Formato: YAML para gestión fácil y seguimiento
# Última actualización: 14 julio 2026 (Lola Casademunt - CEO identificado)
# Fuente: Excel "Empresas y contactos de interés.xlsx" + ficheros de contacto existentes

# === ESTADOS DEL PIPELINE ===
# 0. Prospección — Primer contacto aún no hecho
# 1. Primer mensaje — Mensaje enviado, esperando respuesta
# 2. Segundo mensaje — Follow-up enviado
# 3. Reunión entrevista — Reunión realizada
# 4. Precontrato — En negociación
# 5. Contrato — Cliente activo
# 6. Anulado — Descartado
# 7. Bloqueado MV — Bloqueado por motivos externos

# === CONTACTOS CON ACCIÓN REQUERIDA ===

